version: "3.9"

# Stack de homologação Target Music: PostgreSQL + Redis + Prometheus + Grafana
# Portas escolhidas para não conflitar com security-spring (8080/5433/6380/9090/3000)
#
# Uso: docker compose up -d
# A aplicação roda fora do compose:
#   SPRING_PROFILES_ACTIVE=hml ./mvnw spring-boot:run -Dspring-boot.run.jvmArguments="-Dserver.port=8090"
# Prometheus scrapa http://host.docker.internal:8090/actuator/prometheus a cada 15s

services:
  postgres-tm:
    image: postgres:16-alpine
    container_name: postgres-tm
    restart: unless-stopped
    environment:
      POSTGRES_DB: targetmusic
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - pgdata_tm:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d targetmusic"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis-tm:
    image: redis:7-alpine
    container_name: redis-tm
    restart: unless-stopped
    command: redis-server --requirepass tm_redis_2026
    ports:
      - "6381:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "tm_redis_2026", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  prometheus-tm:
    image: prom/prometheus:v2.52.0
    container_name: prometheus-tm
    restart: unless-stopped
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheusdata_tm:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana-tm:
    image: grafana/grafana:11.0.0
    container_name: grafana-tm
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_USERS_DEFAULT_THEME: "dark"
      GF_SERVER_ROOT_URL: "http://localhost:3001"
      GF_UNIFIED_ALERTING_ENABLED: "true"
      GF_ALERTING_ENABLED: "false"
    volumes:
      - grafanadata_tm:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus-tm
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  pgdata_tm:
  prometheusdata_tm:
  grafanadata_tm:
