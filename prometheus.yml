global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: target-music
    metrics_path: /actuator/prometheus
    static_configs:
      # host.docker.internal resolve para o host no Docker Desktop (Mac/Windows) e
      # em Linux com --add-host=host.docker.internal:host-gateway no container.
      # Em hml: actuator na porta 8091 (sem filtro JWT)
      - targets: ["host.docker.internal:8091"]
