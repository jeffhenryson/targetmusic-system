# Homologacao (staging) profile - PostgreSQL
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5434/targetmusic}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Usar Flyway para schema; desabilitar DDL auto
spring.jpa.hibernate.ddl-auto=none
spring.flyway.enabled=true
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# H2 console disabled in hml
spring.h2.console.enabled=false

# JWT (hml) - always set via env in CI/CD
jwt.secret=${JWT_SECRET}
jwt.access-ttl-minutes=${JWT_ACCESS_TTL_MINUTES:15}
jwt.refresh-ttl-days=${JWT_REFRESH_TTL_DAYS:7}
jwt.issuer=${JWT_ISSUER}
jwt.audience=${JWT_AUDIENCE}

# CORS (definir via env em hml)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://example.com}
cors.allowed-methods=${CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,OPTIONS,PATCH}
cors.allowed-headers=${CORS_ALLOWED_HEADERS:Authorization,Content-Type}
cors.allow-credentials=${CORS_ALLOW_CREDENTIALS:true}

# Cookie de refresh: false em HML local (HTTP), true quando atrás de proxy HTTPS (defina COOKIE_SECURE=true)
cookie.secure=${COOKIE_SECURE:false}

# Actuator exposure in hml — prometheus para scraping por Grafana/CloudWatch agent
# management.server.port separa o actuator da porta principal (sem filtro JWT)
management.server.port=8091
management.server.address=0.0.0.0
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=when_authorized

# Login rate limiting (hml)
rate.limit.login.window-seconds=${LOGIN_RATE_WINDOW_SECONDS:60}
rate.limit.login.max-requests=${LOGIN_RATE_MAX_REQUESTS:10}

# Swagger habilitado em hml — UI pública, spec (/v3/api-docs/**) exige ROLE_DEV
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true

# Confiar nos headers X-Forwarded-* do proxy reverso (nginx/ALB)
# Necessário para que o rate limiting use o IP real do cliente (não o IP do proxy)
server.forward-headers-strategy=native

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.ssl.enabled=${REDIS_SSL:false}

# Cache — UserDetails cache via Redis (distribuído entre instâncias)
spring.cache.type=redis
spring.cache.redis.time-to-live=60s

# Health groups: liveness does NOT include Redis so an unstable Redis does
# not cause liveness probes to kill healthy pods. Readiness includes Redis
# so traffic is only routed when Redis is available.
management.health.redis.enabled=true
management.endpoint.health.group.liveness.include=livenessState
management.endpoint.health.group.readiness.include=readinessState,db,redis

# Lockout por usuário (hml)
auth.lockout.max-attempts=${AUTH_LOCKOUT_MAX_ATTEMPTS:5}
auth.lockout.duration-minutes=${AUTH_LOCKOUT_DURATION_MINUTES:15}

# Email verification (hml)
email.provider=${EMAIL_PROVIDER:resend}
email.verification.ttl-minutes=${EMAIL_VERIFICATION_TTL_MINUTES:15}
email.verification.resend-cooldown-seconds=${EMAIL_RESEND_COOLDOWN_SECONDS:60}
email.verification.frontend-url=${EMAIL_VERIFICATION_FRONTEND_URL:http://localhost:4201/auth/verify-email}
resend.api-key=${RESEND_API_KEY}
resend.from=${RESEND_FROM:noreply@example.com}

# Scheduler
refresh-token.cleanup.cron=${REFRESH_TOKEN_CLEANUP_CRON:0 0 3 * * *}

# Métricas — histograma de latência HTTP para percentis p50/p95/p99 no Grafana
management.metrics.distribution.percentiles-histogram.http.server.requests=true

# Security headers
security.content-security-policy=${SECURITY_CSP:default-src 'none'; frame-ancestors 'none'}

# 2FA / TOTP — gere com: openssl rand -base64 32 e defina TOTP_ENCRYPTION_KEY no ambiente
# Sem default intencional: HmlStartupValidator falha no boot se não estiver definido.
totp.encryption.key=${TOTP_ENCRYPTION_KEY}
totp.app-name=${TOTP_APP_NAME:Target Music}

# Avatar storage
# local: arquivos salvos em avatar.storage.dir (compartilhado entre instâncias via NFS/EBS)
# s3:    arquivos no S3 — definir avatar.s3.* abaixo
avatar.storage.type=${AVATAR_STORAGE_TYPE:local}
avatar.storage.dir=${AVATAR_STORAGE_DIR:./uploads/avatars}
avatar.base-url=${AVATAR_BASE_URL:https://example.com}
avatar.max-size-bytes=${AVATAR_MAX_SIZE_BYTES:2097152}

# S3 (ativo quando avatar.storage.type=s3)
# Em ECS/EC2 com IAM role, omitir access-key e secret-key
avatar.s3.bucket=${AVATAR_S3_BUCKET:}
avatar.s3.region=${AVATAR_S3_REGION:us-east-1}
avatar.s3.public-url-base=${AVATAR_S3_PUBLIC_URL_BASE:}
