<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Alerta de segurança</title></head>
<body style="margin:0;padding:0;background:#f5f5f5;font-family:sans-serif">
<table width="100%" cellpadding="0" cellspacing="0" style="background:#f5f5f5;padding:32px 16px">
  <tr><td align="center">
    <table width="600" cellpadding="0" cellspacing="0" style="background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.08)">
      <tr><td style="background:#b91c1c;padding:24px 32px">
        <span style="color:#fff;font-size:1.25rem;font-weight:bold">Target Music — Alerta de segurança</span>
      </td></tr>
      <tr><td style="padding:32px">
        <h2 style="margin:0 0 16px;color:#b91c1c" th:text="${title}">Título do alerta</h2>
        <p style="color:#333">Olá, <strong th:text="${username}">username</strong>!</p>
        <p style="color:#333" th:text="${message}">Mensagem principal do alerta.</p>
        <div style="background:#fff3f3;border-left:4px solid #b91c1c;padding:12px 16px;margin:20px 0;border-radius:0 6px 6px 0">
          <p style="color:#555;font-size:.875rem;margin:0" th:text="${footerMessage}">Instrução adicional de segurança.</p>
        </div>
      </td></tr>
      <tr><td style="background:#f9f9f9;padding:16px 32px;border-top:1px solid #eee">
        <p style="color:#aaa;font-size:.75rem;margin:0;text-align:center">
          &copy; Target Music — Enviado automaticamente, não responda este email.
        </p>
      </td></tr>
    </table>
  </td></tr>
</table>
</body>
</html>
