<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Email da conta alterado</title></head>
<body style="margin:0;padding:0;background:#f5f5f5;font-family:sans-serif">
<table width="100%" cellpadding="0" cellspacing="0" style="background:#f5f5f5;padding:32px 16px">
  <tr><td align="center">
    <table width="600" cellpadding="0" cellspacing="0" style="background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.08)">
      <tr><td style="background:#1e40af;padding:24px 32px">
        <span style="color:#fff;font-size:1.25rem;font-weight:bold">Target Music</span>
      </td></tr>
      <tr><td style="padding:32px">
        <h2 style="margin:0 0 16px;color:#111">Email da conta alterado</h2>
        <p style="color:#333">Olá, <strong th:text="${username}">username</strong>!</p>
        <p style="color:#333">
          O email de acesso à sua conta foi alterado para
          <strong th:text="${newEmail}">novo@email.com</strong>.
        </p>
        <p style="color:#777;font-size:.8rem;margin-top:20px">
          Se você não realizou esta alteração, entre em contato com o suporte imediatamente.
        </p>
      </td></tr>
      <tr><td style="background:#f9f9f9;padding:16px 32px;border-top:1px solid #eee">
        <p style="color:#aaa;font-size:.75rem;margin:0;text-align:center">
          &copy; Target Music — Enviado automaticamente, não responda este email.
        </p>
      </td></tr>
    </table>
  </td></tr>
</table>
</body>
</html>
