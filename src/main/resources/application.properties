spring.application.name=target-music

# Multipart — limite ligeiramente acima do max do avatar (2 MB) para absorver overhead de boundary
spring.servlet.multipart.max-file-size=${MULTIPART_MAX_FILE_SIZE:3MB}
spring.servlet.multipart.max-request-size=${MULTIPART_MAX_REQUEST_SIZE:3MB}

# ATENÇÃO: o perfil padrão "dev" é permissivo (H2 aberto, CORS *, seed de usuários hardcoded).
# Em produção, defina SPRING_PROFILES_ACTIVE=prod via variável de ambiente.
# Deploy sem essa variável sobe em modo dev — NUNCA adequado para produção.
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Cache — Caffeine: TTL 60 s, max 500 entradas por cache
# Caches usados: userDetails (CustomUserDetailsService), users (UserRepository), userAuthorities (JpaUserAuthoritiesAdapter)
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=60s

# CORS credentials — deve ser false quando allowed-origins='*' (dev); true com origem específica
cors.allow-credentials=${CORS_ALLOW_CREDENTIALS:false}

# OAuth2 — Google Client ID (obrigatório para validar ID tokens do frontend)
oauth2.google.client-id=${GOOGLE_CLIENT_ID:}

# HikariCP — valores base compartilhados por hml e prod (podem ser sobrescritos por perfil)
spring.datasource.hikari.maximum-pool-size=${HIKARI_MAX_POOL_SIZE:10}
spring.datasource.hikari.minimum-idle=${HIKARI_MIN_IDLE:2}
spring.datasource.hikari.connection-timeout=${HIKARI_CONNECTION_TIMEOUT:30000}
spring.datasource.hikari.idle-timeout=${HIKARI_IDLE_TIMEOUT:600000}
spring.datasource.hikari.max-lifetime=${HIKARI_MAX_LIFETIME:1800000}
# Swagger UI — lembra o Bearer token entre recargas (armazenado em localStorage do browser)
springdoc.swagger-ui.persist-authorization=true

# Não incluir endpoints do actuator no spec do Swagger — eles ficam em porta separada (hml/prod)
# e exigem DEV_ELEVATED em dev. Testá-los via Swagger causaria confusão.
springdoc.show-actuator=false
