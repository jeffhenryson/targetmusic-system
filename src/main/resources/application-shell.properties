# ─────────────────────────────────────────────────────────────────────────────
# Perfil "shell" — CLI administrativo (AdminCliRunner)
#
# Uso:
#   java -jar app.jar --spring.profiles.active=dev,shell <comando> [--opcao=valor]
#
#   ./mvnw spring-boot:run \
#     -Dspring-boot.run.profiles=dev,shell \
#     "-Dspring-boot.run.arguments=<comando> [--opcao=valor]"
#
# Veja docs/cli.md para a referência completa de comandos.
# ─────────────────────────────────────────────────────────────────────────────

# Desativa o servidor web — o CLI roda, executa o comando e encerra
spring.main.web-application-type=none
