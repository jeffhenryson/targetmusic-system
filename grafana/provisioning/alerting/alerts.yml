apiVersion: 1

groups:
  - orgId: 1
    name: security-spring
    folder: Security Alerts
    interval: 1m
    rules:

      - uid: token-theft-alert
        title: Token Theft Detectado
        condition: C
        data:
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: increase(auth_token_theft_total[5m])
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: "-100"
            model:
              type: threshold
              expression: B
              conditions:
                - type: query
                  evaluator:
                    params: [0]
                    type: gt
        noDataState: OK
        execErrState: Error
        for: 0s
        annotations:
          summary: "Token theft detectado em {{ $labels.job }}"
          description: "{{ $values.B }} evento(s) de token theft nos últimos 5 minutos. Verifique sessões suspeitas e considere revogar todos os tokens do usuário afetado."
        labels:
          severity: critical
          team: security

      - uid: account-lockout-spike
        title: Pico de Bloqueios de Conta
        condition: C
        data:
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: increase(auth_account_locked_total[5m])
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: "-100"
            model:
              type: threshold
              expression: B
              conditions:
                - type: query
                  evaluator:
                    params: [5]
                    type: gt
        noDataState: OK
        execErrState: Error
        for: 0s
        annotations:
          summary: "Pico de bloqueios: {{ $values.B }} contas nos últimos 5 minutos"
          description: "Possível ataque de força bruta ou credential stuffing em andamento. Verifique os logs de auditoria e considere aumentar o rate limiting."
        labels:
          severity: warning
          team: security

      - uid: high-error-rate
        title: Alta Taxa de Erros HTTP 5xx
        condition: C
        data:
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: sum(rate(http_server_requests_seconds_count{status=~"5.."}[5m]))
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: "-100"
            model:
              type: threshold
              expression: B
              conditions:
                - type: query
                  evaluator:
                    params: [0.1]
                    type: gt
        noDataState: OK
        execErrState: Error
        for: 2m
        annotations:
          summary: "Taxa de erros 5xx: {{ $values.B | printf \"%.2f\" }} req/s"
          description: "A taxa de erros HTTP 5xx está acima de 0.1 req/s há mais de 2 minutos. Verifique os logs da aplicação."
        labels:
          severity: warning
          team: backend

      - uid: high-p95-latency
        title: Latência p95 Alta
        condition: C
        data:
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: histogram_quantile(0.95, sum(rate(http_server_requests_seconds_bucket[5m])) by (le))
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: "-100"
            model:
              type: threshold
              expression: B
              conditions:
                - type: query
                  evaluator:
                    params: [1]
                    type: gt
        noDataState: OK
        execErrState: Error
        for: 5m
        annotations:
          summary: "Latência p95: {{ $values.B | printf \"%.2f\" }}s"
          description: "A latência p95 está acima de 1 segundo há mais de 5 minutos. Investigue queries lentas, pool de conexões ou problemas de infraestrutura."
        labels:
          severity: warning
          team: backend

      - uid: login-failure-ratio
        title: Alta Taxa de Falhas de Login
        condition: D
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: sum(rate(auth_login_total{result="failure"}[5m]))
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: sum(rate(auth_login_total[5m]))
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: "-100"
            model:
              type: math
              expression: "$A / $B * 100"
              refId: C
          - refId: D
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: "-100"
            model:
              type: threshold
              expression: C
              conditions:
                - type: query
                  evaluator:
                    params: [30]
                    type: gt
        noDataState: OK
        execErrState: Error
        for: 2m
        annotations:
          summary: "Taxa de falha de login: {{ $values.C | printf \"%.1f\" }}% nos últimos 5 minutos"
          description: "Mais de 30% dos logins estão falhando. Possível ataque de credential stuffing ou brute force em andamento. Verifique os logs de auditoria."
        labels:
          severity: warning
          team: security

      - uid: jvm-heap-high
        title: Heap JVM Acima de 85%
        condition: C
        data:
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: sum(jvm_memory_used_bytes{area="heap"}) / sum(jvm_memory_max_bytes{area="heap"}) * 100
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: "-100"
            model:
              type: threshold
              expression: B
              conditions:
                - type: query
                  evaluator:
                    params: [85]
                    type: gt
        noDataState: OK
        execErrState: Error
        for: 5m
        annotations:
          summary: "Heap JVM em {{ $values.B | printf \"%.1f\" }}%"
          description: "O uso de heap está acima de 85% por mais de 5 minutos. Risco de OOM. Verifique memory leaks, aumente o heap máximo ou investigue objetos retidos."
        labels:
          severity: warning
          team: backend

      - uid: hikari-pool-exhausting
        title: Pool HikariCP Próximo do Esgotamento
        condition: C
        data:
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: hikaricp_connections_pending
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: "-100"
            model:
              type: threshold
              expression: B
              conditions:
                - type: query
                  evaluator:
                    params: [5]
                    type: gt
        noDataState: OK
        execErrState: Error
        for: 1m
        annotations:
          summary: "{{ $values.B }} conexões aguardando pool HikariCP"
          description: "Há mais de 5 threads aguardando uma conexão do pool por mais de 1 minuto. Verifique queries lentas, deadlocks ou considere aumentar o pool size."
        labels:
          severity: warning
          team: backend

      - uid: email-delivery-failures
        title: Falhas de Entrega de Email
        condition: C
        data:
          - refId: B
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              expr: increase(email_failed_total[10m])
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
          - refId: C
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: "-100"
            model:
              type: threshold
              expression: B
              conditions:
                - type: query
                  evaluator:
                    params: [3]
                    type: gt
        noDataState: OK
        execErrState: Error
        for: 0s
        annotations:
          summary: "{{ $values.B | printf \"%.0f\" }} falhas de email nos últimos 10 minutos"
          description: "O serviço de email está falhando repetidamente. Verifique a disponibilidade da API Resend, a validade da API key e os logs de erro do adapter."
        labels:
          severity: warning
          team: backend

      - uid: rate-limit-spike
        title: Pico de Bloqueios por Rate Limit
        condition: C
        data:
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: increase(auth_rate_limit_blocked_total[5m])
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: "-100"
            model:
              type: threshold
              expression: B
              conditions:
                - type: query
                  evaluator:
                    params: [10]
                    type: gt
        noDataState: OK
        execErrState: Error
        for: 0s
        annotations:
          summary: "{{ $values.B | printf \"%.0f\" }} requisições bloqueadas por rate limit nos últimos 5 minutos"
          description: "Volume alto de bloqueios por rate limit. Possível ataque de força bruta ou scanner automatizado. Verifique os IPs de origem nos logs."
        labels:
          severity: warning
          team: security
